<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f8f6f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="description" content="Live Pomodoro Status">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Moritz Status</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f6f1;
    --surface: #ffffff;
    --surface-2: #f0ede6;
    --border: #e0ddd4;
    --text: #1a1a1e;
    --dim: #6a6a78;
    --dim2: #9a9aa4;
    --accent: #3eba6f;
    --accent-glow: rgba(62,186,111,0.08);
    --red: #c82533;
    --yellow: #b08820;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
  }
  * { margin:0; padding:0; box-sizing:border-box }
  html { height:100% }
  body {
    font-family:'DM Sans',system-ui,sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100%;min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    padding:1.5rem;
    -webkit-font-smoothing:antialiased;
  }
  .app { width:100%;max-width:400px }

  /* ── Header ── */
  .header {
    text-align:center;margin-bottom:1.5rem;
  }
  .header h1 {
    font-family:'JetBrains Mono',monospace;font-size:.65rem;
    letter-spacing:.25em;text-transform:uppercase;color:var(--dim2);
    margin-bottom:.25rem;
  }
  .header .subtitle {
    font-size:.75rem;color:var(--dim);
  }

  /* ── Status Card ── */
  .status-card {
    background:var(--surface);border-radius:var(--radius);
    padding:1.5rem;box-shadow:var(--shadow);
    border:1px solid var(--border);
    margin-bottom:1rem;
    transition:border-color .5s;
  }
  .status-card.running { border-color:var(--accent) }
  .status-card.paused { border-color:var(--yellow) }
  .status-card.completed { border-color:var(--accent) }
  .status-card.break { border-color:#6fa3e0 }
  .status-card.working { border-color:#3080c0 }
  .status-card.offline { border-color:var(--border);opacity:.7 }
  .status-card.disconnected { border-color:var(--yellow) }

  .status-indicator {
    display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;
  }
  .status-dot {
    width:10px;height:10px;border-radius:50%;
    background:var(--dim2);flex-shrink:0;
    transition:background .3s;
  }
  .running .status-dot { background:var(--accent);box-shadow:0 0 8px var(--accent-glow);animation:pulse 2s infinite }
  .paused .status-dot { background:var(--yellow);animation:pulse 3s infinite }
  .completed .status-dot { background:var(--accent) }
  .break .status-dot { background:#6fa3e0 }
  .working .status-dot { background:#3080c0;animation:pulse 2s infinite }
  .idle .status-dot { background:var(--dim2) }
  .offline .status-dot { background:#ccc }
  .disconnected .status-dot { background:var(--yellow);animation:pulse 2s infinite }

  @keyframes pulse {
    0%,100% { opacity:1 }
    50% { opacity:.4 }
  }

  .status-label {
    font-family:'JetBrains Mono',monospace;font-size:.65rem;
    letter-spacing:.08em;text-transform:uppercase;
    color:var(--dim);
  }
  .running .status-label { color:var(--accent) }
  .paused .status-label { color:var(--yellow) }
  .break .status-label { color:#6fa3e0 }
  .working .status-label { color:#3080c0 }
  .disconnected .status-label { color:var(--yellow) }

  .task-name {
    font-size:1.4rem;font-weight:700;
    margin-bottom:.5rem;
    min-height:2rem;
    transition:color .3s;
  }

  .timer-display {
    font-family:'JetBrains Mono',monospace;
    font-size:2.8rem;font-weight:700;
    letter-spacing:-.02em;
    color:var(--text);
    margin-bottom:.5rem;
    min-height:3.5rem;
    transition:opacity .3s;
  }
  .timer-display.inactive { opacity:.2;font-size:2rem }

  .timer-end {
    font-family:'JetBrains Mono',monospace;
    font-size:.6rem;color:var(--dim);
    letter-spacing:.04em;
    min-height:1rem;
  }

  .location-row {
    display:flex;align-items:center;gap:.4rem;
    margin-top:.8rem;padding-top:.8rem;
    border-top:1px solid var(--surface-2);
    font-size:.75rem;color:var(--dim);
  }
  .location-icon { font-size:1rem }

  /* ── Stats Row ── */
  .stats-grid {
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;
    margin-bottom:1rem;
  }
  .stat-box {
    background:var(--surface);border-radius:var(--radius-sm);
    padding:.8rem .6rem;box-shadow:var(--shadow);
    border:1px solid var(--border);text-align:center;
  }
  .stat-value {
    font-family:'JetBrains Mono',monospace;
    font-size:1.1rem;font-weight:700;color:var(--text);
  }
  .stat-label {
    font-size:.6rem;color:var(--dim);
    text-transform:uppercase;letter-spacing:.06em;
    margin-top:.15rem;
  }

  /* ── Rank Badge ── */
  .rank-row {
    display:flex;align-items:center;justify-content:center;gap:.5rem;
    margin-bottom:1rem;
  }
  .rank-icon { font-size:1.2rem }
  .rank-name {
    font-family:'JetBrains Mono',monospace;
    font-size:.65rem;font-weight:700;
    color:var(--accent);letter-spacing:.06em;
    text-transform:uppercase;
  }
  .streak-badge {
    font-family:'JetBrains Mono',monospace;
    font-size:.55rem;color:var(--yellow);
    background:rgba(176,136,32,0.08);
    padding:2px 8px;border-radius:4px;
    border:1px solid rgba(176,136,32,0.2);
  }
  .shield-badge {
    font-family:'JetBrains Mono',monospace;font-size:.55rem;
    color:var(--yellow);letter-spacing:.1em;
  }

  /* ── Daily Goal ── */
  .goal-section {
    margin-bottom:1rem;background:var(--surface);border-radius:var(--radius-sm);
    padding:.75rem 1rem;box-shadow:var(--shadow);border:1px solid var(--border);
  }
  .goal-header { display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.35rem }
  .goal-label { font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--dim);letter-spacing:.06em;text-transform:uppercase }
  .goal-value { font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--dim) }
  .goal-value .gv { color:var(--text);font-weight:700;font-size:.55rem }
  .goal-value .gdone { color:var(--accent) }
  .goal-track { height:5px;background:var(--surface-2);border-radius:4px;overflow:hidden;position:relative }
  .goal-fill { height:100%;border-radius:4px;transition:width .8s cubic-bezier(.16,1,.3,1),background .3s }
  .goal-fill.under { background:var(--accent) }
  .goal-fill.done { background:var(--yellow);box-shadow:0 0 8px rgba(176,136,32,0.15) }
  .goal-milestone { position:absolute;top:-1px;width:2px;height:7px;background:var(--dim2);border-radius:1px;opacity:.3 }
  .goal-milestone.hit { background:var(--yellow);opacity:.7 }

  /* ── Footer ── */
  .footer {
    text-align:center;padding-top:.5rem;
  }
  .last-update {
    font-family:'JetBrains Mono',monospace;
    font-size:.5rem;color:var(--dim2);
    letter-spacing:.04em;
  }

  /* ── Connection banner ── */
  .conn-banner {
    text-align:center;font-size:.7rem;
    padding:.5rem;border-radius:var(--radius-sm);
    margin-bottom:1rem;display:none;
  }
  .conn-banner.error {
    display:block;background:rgba(200,37,51,0.06);
    color:var(--red);border:1px solid rgba(200,37,51,0.15);
  }
  .conn-banner.connecting {
    display:block;background:rgba(176,136,32,0.06);
    color:var(--yellow);border:1px solid rgba(176,136,32,0.15);
  }

  /* ── Notification Permission ── */
  .notif-bar {
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:.75rem 1rem;
    margin-bottom:1rem;display:flex;align-items:center;
    justify-content:space-between;gap:.5rem;
    box-shadow:var(--shadow);
  }
  .notif-bar.hidden { display:none }
  .notif-text { font-size:.75rem;color:var(--dim) }
  .notif-btn {
    font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;
    background:var(--accent);color:#fff;border:none;
    padding:.4rem .8rem;border-radius:6px;cursor:pointer;
    white-space:nowrap;
  }
  .notif-btn:active { opacity:.8 }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Live Status</h1>
    <div class="subtitle" id="nameLabel">Moritz · Pomodoro</div>
  </div>

  <div class="conn-banner" id="connBanner"></div>

  <div class="notif-bar" id="notifBar">
    <span class="notif-text">Benachrichtigungen aktivieren?</span>
    <button class="notif-btn" onclick="requestNotifPermission()">Erlauben</button>
  </div>

  <div class="status-card idle" id="statusCard">
    <div class="status-indicator">
      <div class="status-dot"></div>
      <div class="status-label" id="statusLabel">Verbinde...</div>
    </div>
    <div class="task-name" id="taskName">—</div>
    <div class="timer-display inactive" id="timerDisplay">--:--</div>
    <div class="timer-end" id="timerEnd"></div>
    <div class="location-row">
      <span class="location-icon" id="locIcon">📍</span>
      <span id="locText">Unbekannt</span>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-value" id="statSessions">0</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statMinutes">0</div>
      <div class="stat-label">Minuten</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statStreak">0</div>
      <div class="stat-label">Streak</div>
    </div>
  </div>

  <div class="goal-section" id="goalSection" style="display:none">
    <div class="goal-header">
      <div class="goal-label">Tagesziel</div>
      <div class="goal-value" id="goalValue"><span class="gv">0</span> / 0 min</div>
    </div>
    <div class="goal-track">
      <div class="goal-fill under" id="goalFill" style="width:0%"></div>
      <div class="goal-milestone" style="left:25%"></div>
      <div class="goal-milestone" style="left:50%"></div>
      <div class="goal-milestone" style="left:75%"></div>
    </div>
  </div>

  <div class="rank-row">
    <span class="rank-icon" id="rankIcon">⬡</span>
    <span class="rank-name" id="rankName">—</span>
    <span class="streak-badge" id="streakBadge" style="display:none">🔥 0 Tage</span>
    <span class="shield-badge" id="shieldBadge"></span>
  </div>

  <div class="footer">
    <div class="last-update" id="lastUpdate">Warte auf Daten...</div>
  </div>
</div>

<script>
// ── Firebase Config (MUSS IDENTISCH sein mit timer7) ──
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyD2JeGbi7sfA3gUrD6aGaTN7qvx4vwjj6g",
  authDomain: "pomodoro-status.firebaseapp.com",
  databaseURL: "https://pomodoro-status-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pomodoro-status",
  storageBucket: "pomodoro-status.firebasestorage.app",
  messagingSenderId: "809965598837",
  appId: "1:809965598837:web:0211d4cd6b9fb13e3ba03c"
};

const STATUS_MAP = {
  running: { label: 'Arbeitet', emoji: '🟢' },
  paused: { label: 'Pausiert', emoji: '⏸' },
  completed: { label: 'Fertig!', emoji: '✅' },
  break: { label: 'Verpflegung', emoji: '🥤' },
  working: { label: 'Arbeitet', emoji: '🏥' },
  idle: { label: 'Bereit', emoji: '💤' },
  offline: { label: 'Offline', emoji: '⚫' },
  disconnected: { label: 'Arbeitet · Signal weg', emoji: '🟡' }
};

let _timerInterval = null;
let _lastStatus = null;
let _lastTimestamp = null;
let _notifPermission = Notification?.permission || 'default';
let _connected = false;
let _cachedTimerEnd = null;
let _cachedTask = null;
let _cachedTaskColor = null;
let _localTransition = false; // set when disconnected countdown expires locally

// ── Init ──
function init() {
  // Check notification permission
  updateNotifBar();

  // Register service worker for installability
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  if (FIREBASE_CONFIG.apiKey === 'PASTE_HERE') {
    showConnBanner('error', 'Firebase nicht konfiguriert — siehe Setup-Anleitung');
    return;
  }

  // Load Firebase SDK dynamically (non-blocking)
  showConnBanner('connecting', 'Lade...');
  const s1 = document.createElement('script');
  s1.src = 'https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js';
  s1.onload = () => {
    const s2 = document.createElement('script');
    s2.src = 'https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js';
    s2.onload = () => _startFirebaseListener();
    s2.onerror = () => showConnBanner('error', 'Firebase SDK konnte nicht geladen werden');
    document.head.appendChild(s2);
  };
  s1.onerror = () => showConnBanner('error', 'Firebase SDK konnte nicht geladen werden');
  document.head.appendChild(s1);
}

function _startFirebaseListener() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.database();
    const ref = db.ref('status/moritz');

    // Connection state
    db.ref('.info/connected').on('value', snap => {
      _connected = snap.val() === true;
      if (_connected) {
        hideConnBanner();
      } else {
        showConnBanner('connecting', 'Verbinde...');
      }
    });

    // Listen for status changes
    ref.on('value', snap => {
      const data = snap.val();
      if (!data) {
        showConnBanner('connecting', 'Noch keine Daten empfangen');
        return;
      }
      hideConnBanner();
      updateUI(data);
    });

  } catch (e) {
    showConnBanner('error', 'Firebase Fehler: ' + e.message);
  }
}

// ── Update UI ──
function updateUI(data) {
  const card = document.getElementById('statusCard');
  let status = data.status || 'offline';
  _localTransition = false; // real Firebase data arrived, reset local flag

  // Cache timer state when running
  if (status === 'running' && data.timerEnd) {
    _cachedTimerEnd = data.timerEnd;
    _cachedTask = data.task;
    _cachedTaskColor = data.taskColor;
  }

  // Smart offline: if status is 'offline' but we have a cached timerEnd still in the future,
  // show "disconnected" (timer still counting) instead of full offline
  if (status === 'offline' && _cachedTimerEnd && _cachedTimerEnd > Date.now()) {
    status = 'disconnected';
    // Preserve task info from cache if data lost it
    if (!data.task && _cachedTask) {
      data = { ...data, task: _cachedTask, taskColor: _cachedTaskColor, timerEnd: _cachedTimerEnd };
    }
    if (!data.timerEnd && _cachedTimerEnd) {
      data = { ...data, timerEnd: _cachedTimerEnd };
    }
  }

  // Clear cache when timer is done or status is genuinely idle/offline
  if (status === 'idle' || status === 'completed' || status === 'break' || status === 'working') {
    _cachedTimerEnd = null;
    _cachedTask = null;
    _cachedTaskColor = null;
  }

  const info = STATUS_MAP[status] || STATUS_MAP.offline;

  // Detect status change for notification
  // Don't notify for running<->disconnected transitions (same conceptual state)
  const isRunLike = s => s === 'running' || s === 'disconnected';
  if (_lastStatus !== null && _lastStatus !== status && !(isRunLike(_lastStatus) && isRunLike(status))) {
    sendNotification(data, status);
  }
  _lastStatus = status;

  // Card state
  card.className = 'status-card ' + status;

  // Status label
  document.getElementById('statusLabel').textContent = info.label;

  // Task name
  const taskEl = document.getElementById('taskName');
  if (status === 'working') {
    taskEl.textContent = 'Arbeit';
    taskEl.style.color = '#3080c0';
  } else if (data.task) {
    taskEl.textContent = data.task;
    taskEl.style.color = data.taskColor || 'var(--text)';
  } else {
    taskEl.textContent = '—';
    taskEl.style.color = 'var(--dim2)';
  }

  // Timer
  clearInterval(_timerInterval);
  const timerEl = document.getElementById('timerDisplay');
  const endEl = document.getElementById('timerEnd');

  if ((status === 'running' || status === 'disconnected') && data.timerEnd) {
    timerEl.className = 'timer-display';
    timerEl.style.color = '';
    const isDisconnected = status === 'disconnected';
    const updateCountdown = () => {
      const rem = Math.max(0, Math.ceil((data.timerEnd - Date.now()) / 1000));
      const m = Math.floor(rem / 60), s = rem % 60;
      timerEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      if (rem <= 0) {
        clearInterval(_timerInterval);
        _cachedTimerEnd = null;
        _cachedTask = null;
        _cachedTaskColor = null;
        // If we were in disconnected mode, locally transition to completed
        if (isDisconnected) {
          _localTransition = true;
          card.className = 'status-card completed';
          document.getElementById('statusLabel').textContent = 'Wahrsch. fertig';
          timerEl.className = 'timer-display inactive';
          timerEl.textContent = '✓';
          endEl.textContent = '';
        }
      }
    };
    updateCountdown();
    _timerInterval = setInterval(updateCountdown, 1000);
    const end = new Date(data.timerEnd);
    endEl.textContent = 'fertig um ' + end.getHours().toString().padStart(2, '0') + ':' + end.getMinutes().toString().padStart(2, '0');
  } else if (status === 'break') {
    // Snack/Verpflegung — no timer countdown
    timerEl.className = 'timer-display';
    timerEl.style.color = '#6fa3e0';
    timerEl.textContent = '🥤';
    endEl.textContent = 'Verpflegung';
  } else if (status === 'working') {
    timerEl.className = 'timer-display';
    timerEl.style.color = '#3080c0';
    if (data.workStart) {
      const updateWork = () => {
        const elapsed = Math.max(0, Math.floor((Date.now() - data.workStart) / 1000));
        const h = Math.floor(elapsed / 3600), m = Math.floor((elapsed % 3600) / 60);
        timerEl.textContent = h > 0 ? h + 'h ' + m + 'm' : m + ' min';
      };
      updateWork();
      _timerInterval = setInterval(updateWork, 10000);
    } else {
      timerEl.textContent = '🏥';
    }
    endEl.textContent = 'Bei der Arbeit';
  } else if (status === 'paused' && data.pausedRemaining) {
    timerEl.className = 'timer-display';
    timerEl.style.color = '';
    const rem = Math.ceil(data.pausedRemaining / 1000);
    const m = Math.floor(rem / 60), s = rem % 60;
    timerEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    endEl.textContent = '⏸ pausiert';
  } else {
    timerEl.className = 'timer-display inactive';
    timerEl.style.color = '';
    timerEl.textContent = '--:--';
    endEl.textContent = '';
  }

  // Location
  const locIcon = document.getElementById('locIcon');
  const locText = document.getElementById('locText');
  if (data.isHome === true) {
    locIcon.textContent = '🏠';
    locText.textContent = 'Zuhause · Märwil';
  } else if (data.isHome === false) {
    locIcon.textContent = '🌍';
    locText.textContent = 'Unterwegs';
  } else {
    locIcon.textContent = '📍';
    locText.textContent = 'Unbekannt';
  }

  // Stats
  document.getElementById('statSessions').textContent = data.todayCount || 0;
  document.getElementById('statMinutes').textContent = data.todayMinutes || 0;
  document.getElementById('statStreak').textContent = data.streak || 0;

  // Rank
  if (data.rankIcon) document.getElementById('rankIcon').textContent = data.rankIcon;
  if (data.rank) document.getElementById('rankName').textContent = data.rank;
  const sb = document.getElementById('streakBadge');
  if (data.streak > 1) {
    sb.style.display = '';
    sb.textContent = '🔥 ' + data.streak + ' Tage';
  } else {
    sb.style.display = 'none';
  }

  // Shields
  const shieldEl = document.getElementById('shieldBadge');
  const shields = data.shields || 0;
  shieldEl.textContent = shields > 0 ? '🛡'.repeat(shields) : '';

  // Daily Goal
  const goalSec = document.getElementById('goalSection');
  const todayMin = data.todayMinutes || 0;
  const dailyGoal = data.dailyGoal || 0;
  if (dailyGoal > 0) {
    goalSec.style.display = '';
    const pct = Math.min(100, (todayMin / dailyGoal) * 100);
    const done = todayMin >= dailyGoal;
    const goalVal = document.getElementById('goalValue');
    goalVal.innerHTML = done
      ? '<span class="gv gdone">✓ ' + todayMin + '</span> / ' + dailyGoal + ' min'
      : '<span class="gv">' + todayMin + '</span> / ' + dailyGoal + ' min';
    const fill = document.getElementById('goalFill');
    fill.style.width = pct + '%';
    fill.className = 'goal-fill ' + (done ? 'done' : 'under');
    document.querySelectorAll('.goal-milestone').forEach(m => {
      const mPct = parseFloat(m.style.left);
      m.classList.toggle('hit', todayMin >= dailyGoal * (mPct / 100));
    });
  } else {
    goalSec.style.display = 'none';
  }

  // Last update
  _lastTimestamp = data.timestamp || null;
  renderLastUpdate();
}

// ── Notifications ──
function updateNotifBar() {
  const bar = document.getElementById('notifBar');
  if (!('Notification' in window)) {
    bar.classList.add('hidden');
    return;
  }
  if (Notification.permission === 'granted') {
    bar.classList.add('hidden');
  } else if (Notification.permission === 'denied') {
    bar.classList.add('hidden');
  } else {
    bar.classList.remove('hidden');
  }
}

function requestNotifPermission() {
  if (!('Notification' in window)) return;
  Notification.requestPermission().then(p => {
    _notifPermission = p;
    updateNotifBar();
  });
}

let _lastNotifTime = 0;

function sendNotification(data, status) {
  if (Notification.permission !== 'granted') return;
  // BUG 9 fix: Debounce — suppress notifications within 5s of each other
  const now = Date.now();
  if (now - _lastNotifTime < 5000) return;
  _lastNotifTime = now;

  // Don't notify for every state, just meaningful ones
  let title, body;
  const task = data.task || '';

  switch (status) {
    case 'running':
      title = '▶ ' + task;
      body = data.duration + ' min gestartet';
      break;
    case 'completed':
      title = '✅ ' + (data.completedTask || task) + ' fertig!';
      body = (data.completedMinutes || data.duration) + ' min · Heute: ' + (data.todayMinutes || 0) + ' min total';
      break;
    case 'break':
      title = '🥤 Verpflegung';
      body = 'Heute bisher: ' + (data.todayCount || 0) + ' Sessions, ' + (data.todayMinutes || 0) + ' min';
      break;
    case 'working':
      title = '🏥 Arbeit gestartet';
      body = 'Pomodoro-Timer pausiert';
      break;
    case 'paused':
      title = '⏸ ' + task + ' pausiert';
      if (data.pausedRemaining) {
        const remMin = Math.ceil(data.pausedRemaining / 60000);
        body = remMin + ' min verbleibend';
      } else {
        body = 'Timer pausiert';
      }
      break;
    default:
      return; // don't notify for idle/offline
  }

  // BUG 7 fix: Use SW showNotification as primary (works in background on Android)
  if (navigator.serviceWorker?.controller) {
    navigator.serviceWorker.ready.then(reg => {
      reg.showNotification(title, {
        body,
        icon: 'icon-192.png',
        badge: 'icon-192.png',
        tag: 'moritz-status',
        renotify: true,
        silent: status === 'paused'
      });
    }).catch(() => {
      // Fallback: direct Notification constructor (foreground only)
      try { new Notification(title, { body, icon: 'icon-192.png', tag: 'moritz-status' }); } catch(e) {}
    });
  } else {
    try { new Notification(title, { body, icon: 'icon-192.png', tag: 'moritz-status' }); } catch(e) {}
  }
}

// ── Connection banner ──
function showConnBanner(type, msg) {
  const el = document.getElementById('connBanner');
  el.className = 'conn-banner ' + type;
  el.textContent = msg;
}
function hideConnBanner() {
  document.getElementById('connBanner').className = 'conn-banner';
}

// ── Last update helper ──
function renderLastUpdate() {
  if (!_lastTimestamp) return;
  const d = new Date(_lastTimestamp);
  const now = new Date();
  const diffMin = Math.floor((now - d) / 60000);
  let ago;
  if (diffMin < 1) ago = 'gerade eben';
  else if (diffMin < 60) ago = 'vor ' + diffMin + ' min';
  else ago = 'vor ' + Math.floor(diffMin / 60) + ' h';
  const el = document.getElementById('lastUpdate');
  el.textContent = 'Aktualisiert ' + ago + ' · ' + d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
  // Staleness warning: if >5 min since last update, indicate data may be outdated
  // But skip if we're in 'disconnected' mode or local transition (countdown expired)
  const card = document.getElementById('statusCard');
  if (diffMin >= 5 && !card.classList.contains('disconnected') && !_localTransition) {
    el.style.color = 'var(--yellow)';
    el.textContent += ' ⚠';
    if (!card.classList.contains('offline')) card.style.opacity = '0.6';
  } else {
    el.style.color = '';
    card.style.opacity = '';
  }
}

// ── Start ──
init();

// Periodically refresh "last updated" relative time
setInterval(renderLastUpdate, 10000);
</script>
